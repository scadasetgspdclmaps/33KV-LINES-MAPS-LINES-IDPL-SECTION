<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>TGSPDCL — 33KV IDPL Section GIS</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="css/leaflet.css">
<link rel="stylesheet" href="css/qgis2web.css">

<style>
html, body, #map {
    height: 100%;
    margin: 0;
}

/* TOP BAR */
.topbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 50px;
    background: #0b3d91;
    color: white;
    display: flex;
    align-items: center;
    padding-left: 15px;
    font-weight: bold;
    z-index: 1000;
}

/* SIDE PANEL */
#panel {
    position: fixed;
    top: 50px;
    left: 0;
    width: 240px;
    bottom: 0;
    background: #1e1e1e;
    color: white;
    padding: 10px;
    overflow-y: auto;
    z-index: 1000;
}

#map {
    margin-left: 240px;
    margin-top: 50px;
}

/* LOADER */
#loader {
    position: fixed;
    background: #0b3d91;
    color: white;
    top:0;left:0;right:0;bottom:0;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:2000;
}
</style>
</head>

<body>

<div id="loader">Loading IDPL Section...</div>

<div class="topbar">
33KV IDPL Section GIS
</div>

<div id="panel">
<h3>Layers</h3>
<p>Toggle feeders, SS, EHT</p>
</div>

<div id="map"></div>

<script src="js/leaflet.js"></script>

<!-- REQUIRED DATA ONLY -->
<script src="data/Feeder_Segments_96.js"></script>
<script src="data/Feeder_Segments_WEB_DISPLAY_97.js"></script>
<script src="data/Feeder_Segments_WEB_INTERACT_98.js"></script>
<script src="data/FeederPoles_99.js"></script>
<script src="data/3311KVSSCOORDINATESWITHDATA20_100.js"></script>
<script src="data/SS_WEB_INTERACT_101.js"></script>
<script src="data/EHTSSCOORDINATESWITHDATA_102.js"></script>

<script>

var map = L.map('map').setView([17.48, 78.44], 13);

// BASE MAP
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// =========================
// FEEDER LINES
// =========================
function feederStyle(feature){
    if(feature.properties.Type === "UG"){
        return {color:"blue", weight:3};
    }
    else if(feature.properties.Type === "OH"){
        return {color:"red", weight:3};
    }
    return {color:"yellow", weight:3};
}

var feederLayer = L.geoJson(json_Feeder_Segments_WEB_DISPLAY_97, {
    style: feederStyle
}).addTo(map);

// =========================
// ANIMATION (FLOW EFFECT)
// =========================
function animateFlow(layer){
    let offset = 0;
    setInterval(()=>{
        offset += 1;
        layer.setStyle({
            dashArray: "5,10",
            dashOffset: offset
        });
    },100);
}

animateFlow(feederLayer);

// =========================
// SUBSTATIONS
// =========================
var ssLayer = L.geoJson(json_3311KVSSCOORDINATESWITHDATA20_100, {
    pointToLayer: function (feature, latlng) {
        return L.circleMarker(latlng,{
            radius:8,
            color:"yellow",
            fillColor:"orange",
            fillOpacity:1
        });
    }
}).addTo(map);

// =========================
// EHT SS
// =========================
var ehtLayer = L.geoJson(json_EHTSSCOORDINATESWITHDATA_102, {
    pointToLayer: function (feature, latlng) {
        return L.circleMarker(latlng,{
            radius:10,
            color:"white",
            fillColor:"red",
            fillOpacity:1
        });
    }
}).addTo(map);

// =========================
// POPUPS
// =========================
feederLayer.bindPopup(function(layer){
    return "Feeder: " + (layer.feature.properties.Feeder_Name || "");
});

ssLayer.bindPopup(function(layer){
    return "SS: " + (layer.feature.properties.Name || "");
});

ehtLayer.bindPopup(function(layer){
    return "EHT SS: " + (layer.feature.properties.Name || "");
});

// =========================
// FIT BOUNDS
// =========================
map.fitBounds(feederLayer.getBounds());

// =========================
// LOADER REMOVE
// =========================
setTimeout(()=>{
    document.getElementById("loader").style.display="none";
},1000);

</script>

</body>
</html>
